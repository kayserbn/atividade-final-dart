name: daily_goals
description: "App local de objetivos diários com tema claro/escuro e animações."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Armazenamento local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Foto de perfil
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Animações
  flutter_animate: ^4.5.0

  # Tipografia moderna
  google_fonts: ^6.2.1

  # UUID para IDs únicos das tarefas
  uuid: ^4.4.2

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
